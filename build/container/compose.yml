# build/container/compose.yml
#
# Compose stack for the container-backend daemon
# (docs/plans/phase6-container-backend.md §PR6). PR7 (#823) landed startup
# reap, Wait single-ownership, and persistent transcript spool. Combined
# with §⓪ (broker TCP wire, #825) and §⓪-b (egress proxy dotless refuse,
# #826), this stack briefly became the supported §① dogfood deploy path —
# but the 2026-07-24 dogfood session hit a fatal architecture wall running
# it for real (host filesystem bind mounts for daemon state: docker.sock
# absent on a podman-only host, podman rootless subuid mapping making
# 0600 host files unreadable from inside the container, and — fatally — an
# auto-prune codepath deleting the entire DB because the container could
# not see host project checkouts at all). See
# docs/plans/volume-only-daemon.md (§論点 d secret lifecycle, §論点 i engine
# socket) for the full incident writeup and the redesign this file now
# implements: daemon state (BOID_DATA_DIR / BOID_CONFIG_DIR) moved from
# host BIND mounts to a single daemon-owned NAMED VOLUME (`boid_state`
# below — consolidated from an earlier boid_data/boid_config split per
# [Major 6, PR829 round 1 codex review] and §論点 d/§目的's "named volume に
# 1 本化" invariant) — §決定4 ("host BIND mounts で shared state", and the
# host-daemon-rollback contract that depended on it) is retracted.
# Secret material (secret.key / web_secret / the internal mTLS CA) is
# generated on first boot into the now-empty volume instead of expected to
# pre-exist on the host (see internal/atomicfile, internal/dispatcher.
# LoadOrCreateKey, internal/mtls.LoadOrCreate). This is PR-1a of the
# volume-only-daemon.md staged rollout (§論点 e "PR 分割案 B") — project
# registration (`boid project add <dir>`, still host-path-based) and the
# rest of the CLI/Web config-editing surface are NOT yet updated to the
# volume-only model; those land in the sibling PR-1b/1c/1d and PR-2.
#
# Topology (§決定4/5, minus the retracted persistence half above):
#   - `daemon`: the boid daemon itself, containerized (docker-out-of-docker —
#     mounts the HOST's own /var/run/docker.sock so it can launch job
#     containers as sibling containers, not nested inside itself). It also
#     hosts the egress proxy (internal/sandbox/proxy_manager.go) in-process
#     — no separate proxy service exists here. §決定5 leaves the door open
#     to a standalone proxy container "in the future"; PR6 itself resolves
#     it the other way ("現状の boid の proxy 実装を継続するのが最小 diff") since
#     ProxyManager is a boid-specific Go implementation with no off-the-shelf
#     container image to run it from. Consequently this ONE container must
#     be dual-homed: `boid_internal` (job-reachable — broker / git gateway /
#     dockerproxy / the egress proxy all live in this one process) and the
#     default bridge network (its own outbound internet access — both for
#     the egress proxy's upstream fetches and for the `docker pull`s it
#     issues when creating job containers).
#   - `boid_internal`: the static network skeleton. Every job container's
#     actual network is a per-workspace internal network the daemon creates
#     dynamically at dispatch time (`docker network create --internal
#     --label boid.workspace=<slug> ...`) and `docker network connect`s this
#     daemon container to — compose cannot declare a network that does not
#     exist yet, so only the daemon's own static membership is here (§決定5:
#     "compose は静的骨格... のみを宣言し、workspace internal network は daemon が
#     runtime に... 動的に接続する"). Declared `internal: true` (no default
#     route to the outside) so a job container placed on a workspace network
#     has no path to the internet except back through this daemon's proxy.
#
# Persistence (docs/plans/volume-only-daemon.md §論点 d — supersedes §決定4
# above): BOID_DATA_DIR and BOID_CONFIG_DIR are now a single daemon-owned
# NAMED VOLUME (`boid_state`, declared at the bottom of this file), mounted
# at /home/boid — the `boid` user's own $HOME, per build/container/
# Dockerfile's `useradd --home-dir /home/boid` — not a host path at all.
# XDG_DATA_HOME/XDG_CONFIG_HOME (this service's own `environment:` block
# below) point at /home/boid/.local/share and /home/boid/.config, ordinary
# subdirectories the single volume covers without a separate mount for
# each ([Major 6, PR829 round 1 codex review] — an earlier revision of this
# file mounted boid_data/boid_config as two independent volumes at those
# two subdirectories directly, contradicting §論点 d/§目的's "named volume
# に 1 本化" invariant and this file's own now-updated single-volume
# comments below). This is the direct fix for two of the three
# dogfood-incident walls this file's top comment describes: a named volume
# is container-filesystem-native, so there is no host subuid mapping to
# collide with (wall 2), and the daemon's own container-internal
# filesystem view of its data dir no longer diverges from what the host
# can see (wall 3 — moot now, since nothing here expects the host to see
# this directory at all; the auto-prune codepath that malfunctioned on
# that mismatch is being removed as its own invariant, docs/plans/
# volume-only-daemon.md §論点 a, not a compose-level concern).
#
# Because the container paths are fixed (not derived from a host path the
# way the retracted BOID_DATA_DIR/BOID_CONFIG_DIR bind-mount env vars were),
# the `environment:` block below sets XDG_DATA_HOME/XDG_CONFIG_HOME to
# those same fixed paths as plain literals — cmd/start.go's default*Dir/
# *Path helpers (data side) and internal/config.Load (config side, Go's
# os.UserConfigDir()) key off those two env vars, so they resolve to
# exactly where the named volumes are mounted regardless of what a given
# operator's host XDG_DATA_HOME/XDG_CONFIG_HOME happen to be — no
# scripts/deploy-container.sh computation needed for these two anymore
# (contrast BOID_RUNTIME_DIR below, which is still host-derived).
#
# BOID_RUNTIME_DIR remains a host BIND mount (source == target, unchanged
# from before) — this PR (volume-only-daemon.md §論点 e's PR-1) is scoped
# to daemon *data* persistence and the engine socket only. The CLI's
# reliance on reaching this daemon's UNIX socket by host-visible path (the
# "server socket の host 同一 path bind (相互排他)" mechanism below) is
# retired in favor of a TCP profile in a later PR (§論点 c) — until then
# this bind mount is still load-bearing and is left exactly as-is:
#   - BOID_RUNTIME_DIR -> the host's own socket runtime dir — this is the
#     "server socket の host 同一 path bind (相互排他)" requirement (§決定4):
#     `boid start`'s existing `IsSocketAlive` guard
#     (internal/daemon/daemon.go) dials a UNIX socket by path, so as long as
#     both the host "旧デプロイ" binary and this compose daemon resolve
#     `client.DefaultSocketPath()` to the identical path (true whenever
#     $XDG_RUNTIME_DIR — or its /run/user/<uid> fallback — and the daemon's
#     uid match on both sides, which `user:` below pins), whichever one
#     starts second sees the first one's live socket file and refuses to
#     start. No server.go/daemon.go code changes were needed for this —
#     IsSocketAlive already did the right thing once both sides can see the
#     same path, which is purely a mount/identity concern this compose file
#     is responsible for.
#
# KNOWN GAP (flagged, not fixed by this PR): internal/dispatcher/
# container_backend.go materializes per-job DooD sibling-container mounts
# (dockerTLSDir et al.) from absolute paths it computes under what used to
# be a host-visible BOID_DATA_DIR. Now that BOID_DATA_DIR is a named
# volume, any such path is container-internal only — a DooD sibling
# container the daemon asks the HOST docker engine to create cannot mount
# it. Nothing in this PR touches container_backend.go; this is real latent
# breakage for that specific mechanism, deferred to a follow-up (most
# likely: materialize that per-job material into its own throwaway named
# volume or an emptyDir-style tmpfs mount shared by daemon+sibling via the
# docker API, rather than a filesystem path).
#
# External listener wire status (broker / git gateway / egress proxy are
# backed by real listeners on `boid_internal` now that [Blocker 2, PR7
# codex review] closed the git-gateway and egress-proxy halves and
# docs/plans/phase6-cutover-followups.md §⓪ closed the broker half;
# dockerproxy's listener wiring is still residual — see the sub-bullets
# below for the details):
#   - the broker's, git gateway's, and the default-workspace egress proxy's
#     TCP(mTLS)/TCP listeners all now bind on 0.0.0.0 (composeBindHost)
#     whenever sandbox.backend: container is selected (Server.Start's
#     gatewayBindHost / ProxyManager.BindHost, [Blocker 2, PR7 codex
#     review]) — a container-backend job's git clone, HTTP(S) egress, and
#     broker RPC (`boid task update`, `boid job done`, host-command exec)
#     all resolve their target by the `boid-gateway`/`boid-egress`/
#     `boid-broker` aliases below and reach a real, listening socket, not
#     just a DNS name with nothing behind it. The broker KEEPS mutual TLS
#     (unlike the git gateway, which downgraded to server-only TLS — see
#     mtls.CA.ServerOnlyTLSConfig's own doc comment for why): a per-job
#     short-lived client cert is issued and bind-mounted into the job
#     container at /run/boid/bin/broker-tls/, delivered via five
#     BOID_BROKER_TLS_* env vars (internal/dispatcher/container_backend.go's
#     withBrokerTLSEnv) — the broker-side analogue of dockerproxy's own
#     per-job client cert mechanics (still unwired — see the dockerproxy
#     bullet below).
#   - dockerproxy's own TCP(mTLS) listener (internal/server/server.go) still
#     binds 127.0.0.1:0 (ephemeral loopback), unreachable from a job
#     sibling on `boid_internal` — a residual wiring item this compose file
#     does not attempt to paper over with a decorative `ports:`/`expose:`
#     section. dockerproxy's per-job client-cert ENV delivery (DOCKER_HOST/
#     DOCKER_CERT_PATH/DOCKER_TLS_VERIFY,
#     ContainerBackendOptions.DockerTLS* fields) is implemented and
#     unit-tested but not yet wired into production dispatch — see the next
#     bullet.
#   - the per-workspace internal networks themselves (dynamic, daemon-owned
#     — see `boid_internal`'s own comment above).
#   - dockerproxy's compose-reachable TCP listener itself. The `daemon`
#     service below carries a `boid-dockerproxy` alias on `boid_internal`
#     (PR6 codex review, Blocker 3) so the DNS name a container-backend
#     job's `DOCKER_HOST=tcp://boid-dockerproxy:2376` env
#     (internal/dispatcher/container_backend.go's withDockerTLSEnv) already
#     resolves to THIS container the moment such a job exists — but per
#     this section's first bullet, nothing actually listens on a reachable
#     address/port behind that name yet (still 127.0.0.1:0 loopback,
#     unlike gateway/egress above). Per-job client cert ENV delivery
#     (DOCKER_HOST/DOCKER_CERT_PATH/DOCKER_TLS_VERIFY) is implemented and
#     unit-tested (internal/dispatcher/container_backend.go's
#     ContainerBackendOptions.DockerTLS* fields) but nothing in this compose
#     stack constructs a real, reachable dockerproxy TCP listener or issues
#     real per-job certs against it yet — that, plus an actual e2e dial
#     over `boid_internal`, is docs/plans/phase6-container-backend.md
#     §PR9's e2e-container job. Adding the alias now means the fixed-port/
#     non-loopback listener work that closes this gap is a compose-neutral
#     Go-side change, not another compose edit.
#
# Validated with `podman-compose config` (host has no docker engine, only
# podman — CLAUDE.md) during PR6 development; CI is the source of truth
# going forward (docs/plans/phase6-container-backend.md §PR9's
# e2e-container job actually runs this stack).

services:
  daemon:
    image: boid-runner:latest
    # build/container/Dockerfile's own ENTRYPOINT runs `boid
    # runner-container` (the job/entrypoint command) — overridden here to
    # run the daemon instead, from the exact same shared image (§決定2: "daemon
    # と job runner が同じ versioned base イメージから起動").
    entrypoint: ["/usr/local/bin/boid"]
    command: ["start"]
    # BOID_DAEMON_CHILD=1 is load-bearing, not optional (internal/daemon/
    # daemon.go): plain `boid start` self-re-execs a child, waits for its
    # socket, and EXITS THE PARENT once confirmed healthy — the standard
    # double-fork daemonize pattern for a host process, but fatal for a
    # container's entrypoint. `command: ["start", "--foreground"]` (cmd/
    # start.go's shouldRunForeground, PR6 codex review Major 6) reaches the
    # exact same code path and is the more discoverable spelling for a new
    # supervisor config — this env var form is kept here unchanged rather
    # than migrated, since it already works and this file's own "do not
    # deploy yet" skeleton status (this header's own note) means there is
    # no live config to avoid breaking by leaving it as-is. Even with
    # `init: true` (tini as PID 1) below,
    # tini's whole contract is "exit when MY direct child (this entrypoint
    # process) exits" — the still-running detached grandchild does not save
    # it, tini tears the container down within seconds of a "successful"
    # start. Setting this env var makes `boid start` skip straight to
    # cmd/start.go's runDaemonChild: serve in the foreground + block on
    # SIGINT/SIGTERM — exactly the long-running, signal-handling process a
    # container entrypoint needs, and exactly what forwards docker's
    # SIGTERM (via tini) into srv.Stop() cleanly. (Setsid is part of this
    # same function but skipped under BOID_LOG_STDOUT below — see that
    # env var's own comment for why it must be.)
    #
    # PR6 originally left runDaemonChild's host-daemon code path verbatim:
    # redirect stdin/stdout/stderr to boid.log, THEN Setsid. PR9's own
    # e2e-container job debugging found the real bug this caused: Setsid
    # fails with EPERM when the caller is already a process group leader —
    # true of this container's entrypoint process (tini's direct child) —
    # and that "setsid: operation not permitted" error, printed right after
    # the log-file redirect had already repointed stdout/stderr at a
    # self-pipe, produced a SIGPIPE-killed process (exit 141) with ZERO
    # visible `docker logs` output (see docs/plans/
    # phase6-cutover-followups.md for the full debugging trail — it took a
    # separate BOID_RUNTIME_DIR-writability pre-flight AND making boid.log
    # host-visible via XDG_STATE_HOME to even surface that one line).
    # BOID_LOG_STDOUT below (daemon.ShouldLogToStdout's own doc comment)
    # fixes this at the root: skip Setsid entirely (meaningless in a
    # container regardless — there is no controlling terminal to detach
    # from) AND skip the log-file redirect (let stdout/stderr flow to
    # dockerd's own log driver, which was already capturing them) — both
    # the actual fix and, on the logging half, better practice for a
    # containerized deployment anyway. XDG_STATE_HOME below is kept as a
    # harmless fallback for any future caller that unsets BOID_LOG_STDOUT.
    environment:
      BOID_DAEMON_CHILD: "1"
      # BOID_LOG_STDOUT (PR9): see this service's own comment above and
      # daemon.ShouldLogToStdout's doc comment (internal/daemon/daemon.go)
      # for the full rationale.
      BOID_LOG_STDOUT: "1"
      # XDG_DATA_HOME / XDG_CONFIG_HOME (docs/plans/volume-only-daemon.md
      # §論点 d — replaces the Major 10/PR6 host-path-derived version):
      # fixed literals, not interpolated from the launching shell. Make
      # cmd/start.go's default*Dir/*Path helpers (data side) and
      # internal/config.Load (config side, Go's os.UserConfigDir())
      # resolve to /home/boid/.local/share and /home/boid/.config — both
      # ordinary subdirectories of where the single `boid_state` NAMED
      # VOLUME below is mounted (/home/boid; both env vars end in a literal
      # `/boid` segment the helpers append themselves). This is also, not
      # coincidentally, the
      # image's own baked-in $HOME (build/container/Dockerfile's `useradd
      # --home-dir /home/boid`) — unlike the retracted host-bind-mount
      # design, there is no host XDG layout these need to track anymore,
      # so a fixed literal is correct rather than a gap.
      XDG_DATA_HOME: "/home/boid/.local/share"
      XDG_CONFIG_HOME: "/home/boid/.config"
      # XDG_STATE_HOME (PR9): makes daemon.LogFilePath() (internal/daemon/
      # daemon.go — $XDG_STATE_HOME/boid/boid.log, falling back to
      # $HOME/.local/state/boid/boid.log) resolve under the ALREADY
      # bind-mounted BOID_RUNTIME_DIR instead of the container's own
      # ephemeral writable layer (this service's own header comment above
      # explains why `docker logs` can never show this daemon's own log —
      # the redirect to this file happens before anything else could print
      # to the container's stdout/stderr). No new volume entry needed: this
      # reuses the BOID_RUNTIME_DIR bind mount below. boid.log then lands
      # at `${BOID_RUNTIME_DIR}/boid/boid.log` on the host, readable even
      # after the container is torn down — the debugging path PR9's own
      # e2e-container job uses on a failure.
      XDG_STATE_HOME: "${BOID_RUNTIME_DIR}"
      # XDG_RUNTIME_DIR (PR9 fix — this variable was missing from the PR6
      # skeleton entirely, a real gap the e2e-container job's first real-
      # docker run surfaced): this is the OTHER half of the "server socket
      # の host 同一 path bind (相互排他)" contract the BOID_RUNTIME_DIR
      # comment above already describes — `internal/client.
      # DefaultSocketPath()` (which `cmd/start.go` falls back to whenever
      # no `--socket-path` flag is given, exactly what `command: ["start"]`
      # below does) resolves the daemon's own listen socket to
      # `$XDG_RUNTIME_DIR/boid.sock`, in that priority, BEFORE falling back
      # to `/run/user/<uid>` or a bare `/tmp/boid-<uid>.sock` — neither of
      # which is the BOID_RUNTIME_DIR bind mount below unless it happens to
      # already equal one of them. Without this line the daemon's socket
      # landed inside the container's own ephemeral filesystem instead of
      # the bind-mounted, host-visible BOID_RUNTIME_DIR, breaking both the
      # host-daemon mutual-exclusion guard this whole variable exists for
      # AND every host-side CLI/E2E caller (docs/plans/
      # phase6-container-backend.md §PR9's e2e-container job) that expects
      # to reach this daemon's socket by setting its own XDG_RUNTIME_DIR to
      # the same BOID_RUNTIME_DIR value.
      XDG_RUNTIME_DIR: "${BOID_RUNTIME_DIR}"
      # SSL_CERT_FILE (PR9): empty by default (every non-CI deploy — the
      # bare `${VAR:-}` passthrough is a no-op unless the launching shell
      # actually exports it), inert exactly like every other optional
      # passthrough in this file. e2e/run-container.sh (§PR9's
      # e2e-container job) sets it to a self-signed CA cert path under
      # BOID_RUNTIME_DIR (already bind-mounted above, so no extra volume
      # entry is needed) so the daemon's own outbound git-gateway fetch —
      # Go's net/http, which honors SSL_CERT_FILE via
      # crypto/x509.SystemCertPool on Linux — trusts the e2e fixture
      # upstream's self-signed TLS cert (e2e/lib/common.sh's
      # e2e_setup_fixture_upstream, shared with the userns e2e suite). A
      # real production deploy has no reason to ever set this: its git
      # remotes carry real, publicly-trusted certificates.
      SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
    # HostConfig.Init (docker-init/tini as PID 1, owning zombie reap — §決定3)
    # — compose's `init:` maps directly onto it.
    init: true
    # Matches the host daemon uid so bind-mounted host paths (below) keep
    # their existing ownership, and so job containers this daemon creates
    # (also `--user <uid>:<gid>`, internal/dispatcher/container_backend.go)
    # land on the same uid convention throughout (§決定4). Override via
    # BOID_UID/BOID_GID if the operator's actual host uid is not 1000 — must
    # match the BOID_UID/BOID_GID build args the image was built with
    # (build/container/Dockerfile) or the daemon lands on an unknown uid
    # with no matching image passwd entry.
    user: "${BOID_UID:-1000}:${BOID_GID:-1000}"
    # group_add: the non-root daemon process (user: above) needs
    # supplementary membership in whatever group owns
    # /var/run/docker.sock on THIS host (typically `docker`, mode 0660 —
    # DooD's sibling-container docker.sock bind below) to actually be able
    # to open it (Major 9, PR6 codex review: without this, every docker
    # API call from inside the container fails with a permission error the
    # moment it isn't root). DOCKER_GID is the host's `docker` group GID,
    # NOT baked into the image (it varies by host distro/install) —
    # scripts/deploy-container.sh resolves it via `getent group docker`
    # and exports it; build/container/.env.example documents the same
    # variable for a manual `docker compose`/`podman-compose` invocation.
    # The :-999 fallback is podman-compose 1.0.6's own requirement (an
    # unset var used in a list context fails interpolation on some
    # versions) and happens to match the GID `docker.io`'s Debian/Ubuntu
    # package conventionally allocates when nothing else claims it first —
    # a reasonable default, not a guaranteed-correct one; hosts where it's
    # wrong should rely on deploy-container.sh's getent resolution instead
    # of this literal.
    group_add:
      - "${DOCKER_GID:-999}"
    # extra_hosts (PR9): "host-gateway" is a docker-compose-recognized
    # special value (Docker Engine 20.10+, Linux included since that
    # release — not a Mac/Windows-only feature) that resolves to whatever
    # address routes back to the HOST from inside this container (the
    # bridge network's own gateway IP). Nothing in production code ever
    # resolves "host.docker.internal" — this exists solely so
    # e2e/run-container.sh's fixture git upstream (bound on the CI
    # runner's own host, 0.0.0.0, outside any docker network) is reachable
    # from this daemon's own outbound git-gateway fetch the same way the
    # e2e runner script itself reaches it (both resolve the identical
    # "host.docker.internal" name — the runner via a matching /etc/hosts
    # line the script adds, this container via this entry). Inert for
    # every other deployment: nothing else in the codebase looks this name
    # up.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # DooD: sibling job containers, not nested (§決定4). Engine-agnostic
      # source (docs/plans/volume-only-daemon.md §論点 i, 案 X — Podman
      # promoted to primary target): defaults to the docker-shaped path
      # (works unchanged on a real docker host, and is what CI's
      # e2e-container job — a real-docker runner — still resolves to),
      # overridden to the podman rootless user socket by
      # scripts/deploy-container.sh's engine detection when podman is the
      # engine in use. Container-side path is always /var/run/docker.sock
      # regardless of engine, so no Go-side (DOCKER_HOST-consuming) code
      # needed to change.
      - ${BOID_DOCKER_SOCK_SRC:-/var/run/docker.sock}:/var/run/docker.sock
      # boid_state: the daemon's single, ONE-VOLUME-consolidated persistent
      # state (docs/plans/volume-only-daemon.md §論点 d / §目的's "named
      # volume に 1 本化" — see this file's own "Persistence" header comment
      # above for the full rationale/incident writeup; fix for [Major 6,
      # PR829 round 1 codex review]: an earlier revision of this file split
      # state across boid_data/boid_config, two independently
      # backup-/prune-able volumes, contradicting the plan doc's repeated
      # single-volume language and its §論点 g backup contract — "boid
      # workspace export --all が唯一の正式 backup 経路" only covers
      # workspace/project definitions, so an operator relying on volume
      # snapshotting for the rest necessarily snapshots ONE volume, not a
      # pair they could accidentally desync). Mounted at /home/boid — the
      # image's own baked-in $HOME (build/container/Dockerfile's `useradd
      # --home-dir /home/boid`) — which covers both
      # XDG_DATA_HOME=/home/boid/.local/share and
      # XDG_CONFIG_HOME=/home/boid/.config (this service's own
      # `environment:` block above) as ordinary subdirectories; no separate
      # mount is needed for each. Declared at the bottom of this file.
      - boid_state:/home/boid
      # BOID_RUNTIME_DIR: still a host bind mount, source == target,
      # unchanged (see this file's own "Persistence" header comment for
      # why this one PR does not touch it).
      - ${BOID_RUNTIME_DIR}:${BOID_RUNTIME_DIR}
    networks:
      # boid-dockerproxy: the DNS name a container-backend job's
      # DOCKER_HOST env (internal/dispatcher/container_backend.go's
      # withDockerTLSEnv) is set to — see this file's own "NOT yet true of
      # this file" note above for what this alias does and does not fix
      # yet (PR6 codex review, Blocker 3; dockerproxy's actual reachable
      # TCP listener is still §PR9 territory).
      #
      # boid-gateway / boid-broker / boid-egress [Blocker 2, PR7 codex
      # review; broker TCP wire completed by docs/plans/
      # phase6-cutover-followups.md §⓪]: the compose service DNS names
      # internal/server/server.go's gatewayURLFor/composeEgressServiceName
      # (git gateway sandbox URL, egress proxy HTTP_PROXY host) and
      # composeBrokerServiceName resolve to. Unlike boid-dockerproxy above,
      # all three ARE now backed by a reachable listener: Server.Start
      # binds the git gateway's and broker's TCP(mTLS) listeners, plus the
      # egress proxy's plain TCP listener, on composeBindHost ("0.0.0.0")
      # whenever sandbox.backend: container is selected (gatewayBindHost /
      # ProxyManager.BindHost), instead of the loopback-only "127.0.0.1"
      # every other deployment uses — no further compose-side
      # `ports:`/`expose:` section is needed for inter-container
      # reachability on the same docker network (only host-external
      # exposure needs those). A container-backend job's BOID_BROKER_TLS_ADDR
      # env (internal/dispatcher/container_backend.go's withBrokerTLSEnv)
      # is set to exactly "boid-broker:<port>", so this alias is what makes
      # `boid task update`/`boid job done`/host-command exec actually reach
      # this container from a sibling job container — the broker's older
      # bind-mounted-UNIX-socket path (sandbox_builder.go's BrokerSocket
      # handling) still coexists unchanged for the userns backend, but a
      # container-backend job cannot rely on it (no shared mount namespace
      # with a sibling container the way userns has with the daemon
      # process).
      boid_internal:
        aliases:
          - boid-dockerproxy
          - boid-gateway
          - boid-broker
          - boid-egress
      default: {}
    # No restart policy: `scripts/deploy-container.sh` does an explicit
    # `down` before every `up` (so operator-visible deploy transitions stay
    # explicit rather than being papered over by a silent restart on
    # crash). PR7 (#823) landed startup reap of orphan sibling job
    # containers (SweepOrphans + install_id-scoped ReapOrphans, wired
    # through MarkStale*↔auto-reopen), so a crash + fresh `up` no longer
    # double-executes in-flight jobs the way the pre-PR7 skeleton warned
    # about — but an explicit down/up still surfaces the crash to the
    # operator, which a `restart: on-failure` policy would hide.
    restart: "no"

networks:
  # Declared `internal: true` — no default route out. Every per-workspace
  # job network the daemon creates at dispatch time (not declared here —
  # see the header comment) is `internal: true` too, so the ONLY path any
  # job container has to the outside world is back through the `daemon`
  # service's own egress proxy, itself connected to `default` below for its
  # actual internet access.
  boid_internal:
    internal: true
  # Plain default bridge — the daemon container's own outbound path (egress
  # proxy upstream fetches, `docker pull` for job images, apt/gh package
  # installs at build time notwithstanding — that's the image build, not
  # this runtime network).
  default:
    driver: bridge

volumes:
  # boid_state: the daemon's ENTIRE persistent state, consolidated into a
  # single named volume (docs/plans/volume-only-daemon.md §論点 d / §目的,
  # [Major 6, PR829 round 1 codex review] — see the `daemon` service's own
  # `boid_state` mount comment above for why this was two volumes before
  # and why that was wrong). Plain named volume (no driver_opts) — the
  # operator-visible backup story for workspace/project DEFINITIONS is
  # `boid workspace export --all` (§論点 g), not raw volume snapshotting;
  # for everything else this volume holds (boid.db, secret material, the
  # internal mTLS CA), a host operator who does want a backup takes one of
  # THIS single volume, not a pair that could silently desync.
  boid_state:
