name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'internal/skills/data/**'
      - '.claude/skills/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'internal/skills/data/**'
      - '.claude/skills/**'

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run e2e-tagged in-process tests
        # //go:build e2e が付いたテストは /usr/bin/git などホスト側バイナリを
        # 直接 exec するため通常の go test ./... からは分離している。CI では
        # 本物の git が利用可能なので、ここで明示的に走らせる。
        run: go test -tags=e2e ./internal/sandbox/...

  e2e:
    name: Black-box E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux passt uidmap nftables
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Prerequisite self-check
        run: |
          set -euxo pipefail
          uname -a
          command -v tmux
          command -v pasta
          command -v nft
          command -v unshare
          bash -n e2e/run.sh
          tmux -V
          pasta --help >/dev/null
          unshare --user --map-root-user --mount -- true

      - name: Run black-box E2E suite
        run: ./e2e/run.sh
