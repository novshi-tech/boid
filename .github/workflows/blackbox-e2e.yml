name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'internal/skills/data/**'
      - '.claude/skills/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'internal/skills/data/**'
      - '.claude/skills/**'

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Check internal architecture (forbidden imports)
        # ドキュメント上の規律だった禁止 import グラフ検査を CI enforcement に接続。
        run: bash scripts/check-internal-architecture.sh

      - name: Check templ generated code is up to date
        # web/templates/*_templ.go は checked-in。.templ とのズレを CI で落とす。
        # sandbox 内では templ が使えないため CI 側ゲートが必須の面。
        # generator バージョンは go.mod の a-h/templ と揃える (ズレると spurious diff)。
        run: |
          go install github.com/a-h/templ/cmd/templ@v0.3.1001
          templ generate
          # git diff は tracked ファイルの変更のみ。新規 .templ に対応する未コミット
          # _templ.go (untracked) も drift なので git status で両方拾う。
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::templ generated code is out of date. Run 'templ generate' and commit the result." >&2
            git status --porcelain >&2
            git diff >&2
            exit 1
          fi

      - name: Run unit tests
        # -coverprofile で総カバレッジを可視化する (品質ゲート Tier 1.5)。
        # ./... 全体を単一 profile にマージし、次 step で total 行を出力する。
        # ハード床 (coverage floor) はまだ張らない — まず可視化、傾向を見てから
        # 判断する (数字合わせテストの誘発を避けるため)。
        run: go test -coverprofile=coverage.out ./...

      - name: Report total coverage
        # go tool cover -func の末尾 total 行だけを目立たせて出す。
        # CI ログ集計で拾えるよう grep しやすい固定プレフィックスを付ける。
        run: |
          echo "[coverage] $(go tool cover -func=coverage.out | tail -1)"

      - name: Run e2e-tagged in-process tests
        # //go:build e2e が付いたテストは /usr/bin/git などホスト側バイナリを
        # 直接 exec するため通常の go test ./... からは分離している。CI では
        # 本物の git が利用可能なので、ここで明示的に走らせる。
        # e2e/upstream (docs/plans/git-gateway-cutover.md PR7a) は実
        # git-http-backend 相手の clone/push 往復試験のため同じ理由でここに属す。
        run: go test -tags=e2e ./internal/sandbox/... ./e2e/upstream/...

  race:
    name: Race detector
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with race detector
        # CLAUDE.md の規律 (go test -race) を CI enforcement に接続。並行処理だらけの
        # orchestrator/dispatcher が主戦場。-race は遅いので unit と別ジョブで並列実行。
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # 品質ゲート Tier 2。設定は .golangci.yml (govet / ineffassign / staticcheck /
        # unused の控えめなセット)。enforcement は CI 一択 (sandbox 内は sqlite build
        # 制約で golangci-lint を回せない)。version は再現性のため固定する。
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  container-image:
    name: Container image build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build shared base image (docker)
        # docs/plans/phase6-container-backend.md §PR2: keeps the Phase 6
        # shared base image (build/container/Dockerfile) + its
        # `boid runner-container` entrypoint buildable ahead of the PR5
        # containerBackend/PR7 cutover that will actually launch job
        # containers from it. ubuntu-24.04 runners have docker preinstalled
        # (the host used for day-to-day dev here only has podman — see the
        # Dockerfile's own header comment for why it's engine-agnostic
        # enough for both).
        #
        # Tag by commit SHA, not `latest`: decision 2's version-skew
        # guarantee ("boid update = image rebuild = daemon and job runner on
        # the same version") depends on the image tag identifying an exact
        # boid binary build, once PR5/PR6 start actually resolving an image
        # tag to launch containers from.
        run: docker build -t "boid-runner:${GITHUB_SHA}" -f build/container/Dockerfile .

      - name: Smoke-test the entrypoint
        # Confirms the default ENTRYPOINT is `boid runner-container` (not
        # some ad-hoc shim) and that it fails fast with a clear message
        # when required flags are missing — the same contract every other
        # runner-* subcommand has (cmd/runner.go's newRunnerCmd). Does not
        # exercise a real --spec run (no sandbox spec / broker to point it
        # at in CI) — that lands with the containerBackend e2e in PR9.
        run: |
          set -euo pipefail
          out="$(docker run --rm "boid-runner:${GITHUB_SHA}" 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -q -- 'runner-container: --spec is required'

  e2e:
    name: Black-box E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux passt uidmap nftables
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Prerequisite self-check
        run: |
          set -euxo pipefail
          uname -a
          command -v tmux
          command -v pasta
          command -v nft
          command -v unshare
          bash -n e2e/run.sh
          tmux -V
          pasta --help >/dev/null
          unshare --user --map-root-user --mount -- true

      - name: Regression test run.sh exit-status propagation
        # Guards the run.sh masking bug found alongside PR #735/#736: a
        # failing scenario used to silently report success (and CI stayed
        # green) because of two independent bugs — see run.sh's own comment
        # on run_scenario, and e2e/selftest/run_sh_exit_status_test.sh's own
        # header comment for the full story. Runs before the real suite so a
        # regression here fails fast instead of hiding behind 30+ scenarios'
        # worth of output.
        run: bash e2e/selftest/run_sh_exit_status_test.sh

      - name: Regression test run.sh skip marker
        # Guards the `skip` marker mechanism (PR #736 e2e triage): a handful
        # of scenarios are known-broken for tracked, non-silent reasons
        # (pre-cutover scenario content, or a PR-#735 merge dependency — see
        # each scenario's own `skip` file under e2e/scenarios/) and must be
        # excluded from the default run without ever going quiet about it —
        # docs/plans/quality-gates.md's "no silent caps" principle. See
        # e2e/selftest/run_sh_skip_marker_test.sh's own header comment.
        run: bash e2e/selftest/run_sh_skip_marker_test.sh

      - name: Run black-box E2E suite
        run: ./e2e/run.sh

  e2e-container:
    name: Container backend E2E (requires-docker)
    # docs/plans/phase6-container-backend.md §PR9: real-docker verification
    # of the container backend, additive alongside (never replacing) the
    # `e2e` job above — the userns backend keeps its own full e2e coverage
    # running in parallel until the post-cutover retirement plan
    # (docs/plans/phase6-cutover-followups.md) actually removes it. Every
    # existing docker-proxy-* scenario in the `e2e` job above runs against a
    # FAKE docker HTTP server over the userns backend (policy-only, no real
    # data plane) — this job is the one place a real docker engine actually
    # exercises the container backend's sibling-container path end to end.
    # "requires-docker" (not a marker FILE like e2e/run.sh's
    # requires-sandbox — this is a whole separate job, not a scenario
    # variant) simply means: needs a real docker engine + compose v2
    # plugin, which ubuntu-24.04 runners carry by default (confirmed,
    # §前提 note) — the day-to-day dev host used throughout this plan's own
    # development does NOT (podman only), so this job's coverage has no
    # local-host equivalent today.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # continue-on-error: false (promoted from advisory — docs/plans/
    # phase6-cutover-followups.md §⓪ "broker TCP wire completion" is now
    # landed). This job used to be advisory-only because the broker's own
    # TCP(mTLS) listener bound loopback-only and had no per-job client cert
    # delivery, so a container-backend job could never make broker RPC
    # calls (`boid task update`, `boid job done`, host-command exec) from
    # its sibling job container at all — gateway TLS was fixed earlier
    # (commit 577f9a8, ServerOnlyTLSConfig + gateway CA propagation), but
    # the broker gap remained until this followup: the broker's listener
    # now binds gatewayBindHost(usingContainerBackend) ("0.0.0.0" under
    # sandbox.backend: container) and keeps mutual TLS via a per-job
    # short-lived client cert (internal/dispatcher/container_backend.go's
    # materializeBrokerClientCert), delivered via five BOID_BROKER_TLS_*
    # env vars. e2e/run-container.sh's own workspace-C task
    # (verify-broker-tls.sh) now pins this round trip end to end, so this
    # job gates merges like every other CI job from here on.
    continue-on-error: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Confirm docker + compose v2 are available
        run: |
          set -euxo pipefail
          docker version
          docker compose version

      - name: Run container backend E2E (sibling connectivity + reap)
        # e2e/run-container.sh's own header comment documents the full
        # "sibling 疎通 3 要件" (§決定5) this exercises: job -> own-workspace
        # sibling reachable, job -> a different workspace's sibling
        # unreachable, and `docker compose down` + `boid reap` leaving zero
        # docker resources behind. KEEP_TEMP=1 on a failed run (the script's
        # own EXIT trap already handles this) so the preserved temp root
        # (containing server logs, task JSON snapshots, docker compose
        # logs) is at least visible in this step's own log even though the
        # runner discards the temp dir itself.
        run: ./e2e/run-container.sh
