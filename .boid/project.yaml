id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

# Phase 4-2 (task_behavior simplification): project-top worktree replaces the
# behavior-level `worktree: true` that previously sat on the dev (now executor)
# behavior. `base_branch` is intentionally omitted so executor tasks branch
# from the daemon's current HEAD branch.
worktree: true

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli
  - github.com/novshi-tech/boid-kits/volta

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh

# playwright-cli をサンドボックス内で動かすため、ホストの Chrome バイナリを bind mount する。
additional_bindings:
  - source: /opt/google/chrome
commands:
  shell:
    command:
      - bash

# Canonical behavior names: supervisor (formerly "plan") and executor
# (formerly "dev"). The alias map in spec_loader.go still accepts the old
# keys for back-compat, but the boid repo itself uses the canonical names.
# readonly/worktree are no longer settable per-behavior — they are derived
# from the canonical name (supervisor => readonly, executor => writable
# under the project-top worktree).
task_behaviors:
  executor:
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
        Release step: /dev-pr-flow. The parent supervisor merges the
        PR after CI passes; do not merge here.
  supervisor:
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      message: |
        Integration policy (PR-per-executor): once a child reaches `done`,

        1. Find its PR via `gh pr list --head boid/<task_id8>` (first 8
           chars of the child task id).
        2. If open and mergeable: `gh pr merge --merge --delete-branch`,
           then `git fetch origin && git pull --ff-only origin main`,
           verify, and continue.
        3. If not mergeable:
           - Plain conflict / CI failure with a focused fix:
             `boid task reopen <child_id> -m "<instruction>"` and
             resume monitoring.
           - Anything ambiguous: `boid task notify "$BOID_TASK_ID"
             --ask "..."` the user; do not guess.
