id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh
commands:
  claude:
    command:
      - claude
      - --permission-mode
      - bypassPermissions
      - --append-system-prompt
      - "このセッションは boid sandbox 内で実行されています。環境制約については ~/.boid/context/environment.yaml を参照"
  shell:
    command:
      - bash

task_behaviors:
  dev:
    name: one-shot-dev
    worktree: true
    kits:
      - github.com/novshi-tech/boid-kits/github-auto-merge
    default_instruction:
      type: execution
      consumer: claude-code
      model: sonnet
      message: |
          task.yaml の title と description に記述された内容を実装せよ。
          コミットする前にユニットテストの通過を確認すること。
          E2E テストの検証は CI に任せること（dev タスクで回す必要はない）。

          実装が完了したら以下を順次実行する:
          1. `git add` + `git commit` (worktree のブランチ上で)
          2. `git push -u origin HEAD` で current branch を origin に push
          3. 既存 PR の有無を確認:
             `PR_URL=$(gh pr list --head "$(git branch --show-current)" --json url --jq '.[0].url // ""')`
             空なら `gh pr create --title "<task title>" --body "task: <task_id>\n\n<summary>"` で作成
          4. `gh pr checks --watch --fail-fast` で CI 完了まで待機
             (CI が無いリポは即抜ける) 失敗時は `gh run view --log-failed` でログ取得
             CI が失敗したら exit 非ゼロで終了する (boid 側で job_failed → aborted)
          5. CI 成功で正常終了。 hook の exit trap が `boid job done` を発火し、
             task.exit gate (auto-merge) が PR を merge する
  plan:
    name: Plan
    readonly: true
    traits: [tasks]
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instruction:
      type: execution
      consumer: claude-code
      model: opus
      interactive: true
      message: |
        /boid-plan の記述に従って実装計画を策定せよ。
  auto_plan:
    name: Auto Plan
    readonly: true
    traits: [tasks]
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instruction:
      type: execution
      consumer: claude-code
      model: sonnet
      interactive: false
      message: |
        /boid-plan の記述に従って実装計画を策定せよ。
