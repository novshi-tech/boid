id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh
commands:
  shell:
    command:
      - bash

task_behaviors:
  dev:
    name: dev
    worktree: true
    kits:
      - github.com/novshi-tech/boid-kits/github-auto-merge
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
          Implement what is described in task.yaml's title and description.

          When the implementation is complete, run the /dev-pr-flow skill.
          - Use task.yaml's title as the PR title.
          - Start the PR body with `task: <task_id>`, followed by a summary.
          - If CI fails, exit with a non-zero code (boid will then transition job_failed → aborted).
          Exit normally on CI success. The hook exit trap fires `boid job done`,
          and the task.exit gate (auto-merge) merges the PR.
  plan:
    name: Plan
    readonly: true
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      message: |
        Build an implementation plan as described in /boid-plan.
        The PR created by child dev task will be merged automatically into main by github-auto-merge kit.
        Pull latest changes to verify the changes made by child tasks.
