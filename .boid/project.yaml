id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh
commands:
  shell:
    command:
      - bash

task_behaviors:
  dev:
    name: dev
    worktree: true
    kits:
      - github.com/novshi-tech/boid-kits/github-auto-merge
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
          task.yaml の title と description に記述された内容を実装せよ。

          実装完了後は /dev-pr-flow skill の手順 を実行する。
          - PR title は task.yaml の title を使う
          - PR body は先頭に `task: <task_id>` を置き、続けて要約を書く
          - CI が失敗したら exit 非ゼロで終了する (boid 側で job_failed → aborted)
          CI 成功で正常終了。 hook の exit trap が `boid job done` を発火し、
          task.exit gate (auto-merge) が PR を merge する。
  plan:
    name: Plan
    readonly: true
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      interactive: true
      message: |
        /boid-plan の記述に従って実装計画を策定せよ。
