id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

# Phase 4-2 (task_behavior simplification): project-top worktree replaces the
# behavior-level `worktree: true` that previously sat on the dev (now executor)
# behavior. `base_branch` is intentionally omitted so executor tasks branch
# from the daemon's current HEAD branch.
worktree: true

# Canonical behavior names: supervisor (formerly "plan") and executor
# (formerly "dev"). The alias map in spec_loader.go still accepts the old
# keys for back-compat, but the boid repo itself uses the canonical names.
# readonly/worktree are no longer settable per-behavior — they are derived
# from the canonical name (supervisor => readonly, executor => writable
# under the project-top worktree).
task_behaviors:
  executor:
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
        First, isolate your work on a task-specific branch so that
        push does not land directly on base_branch. Post branch-policy
        simplification (docs/plans/branch-policy-simplification.md
        Phase 1) the in-sandbox clone checks out base_branch itself,
        so per-task branch creation lives here in the executor
        instruction rather than in the dispatcher:

            BRANCH="boid/${BOID_TASK_ID:0:8}"
            git checkout -b "$BRANCH"

        Then run /dev-pr-flow. The parent supervisor merges the PR
        after CI passes; do not merge here.
  supervisor:
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      message: |
        Integration policy (PR-per-executor): once a child reaches `done`,

        1. Find its PR via `gh pr list --head boid/<task_id8>` (first 8
           chars of the child task id).
        2. Review before merging. Run the `boid-review` skill on the PR —
           it applies boid's wiring-invariant + claim-discipline lenses
           that catch the "intentional change + wrong claim" class that
           lint and tests structurally miss. Run `/code-review` too for generic
           bugs. Merge only on a GO verdict. On NO-GO, `boid task reopen
           <child_id> -m "<the finding>"` instead of merging. A clear false
           positive may be overridden, but say why in the merge note.
        3. If open, mergeable, and reviewed GO: `gh pr merge --merge
           --delete-branch`, then `git fetch origin && git pull --ff-only
           origin main`, verify, and continue.
        4. If not mergeable:
           - Plain conflict / CI failure with a focused fix:
             `boid task reopen <child_id> -m "<instruction>"` and
             resume monitoring.
           - Anything ambiguous: `boid task notify "$BOID_TASK_ID"
             --ask "..."` the user; do not guess.
