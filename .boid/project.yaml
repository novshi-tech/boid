id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh
commands:
  shell:
    command:
      - bash

task_behaviors:
  dev:
    name: dev
    worktree: true
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
          Implement what is described in task.yaml's title and description.

          When the implementation is complete, run the /dev-pr-flow skill.
          - Use task.yaml's title as the PR title.
          - Start the PR body with `task: <task_id>`, followed by a summary.
          - If CI fails, exit with a non-zero code (boid will then transition job_failed → aborted).
          Exit normally on CI success. The hook exit trap fires `boid job done`,
          and the parent plan task will merge the PR as part of its supervise loop.
  plan:
    name: Plan
    readonly: true
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      message: |
        Build an implementation plan as described in /boid-plan.

        You own PR-merge responsibility for the dev children you spawn (the
        github-auto-merge kit is no longer attached to dev in this project).
        Once a child dev task reaches `done` in your monitoring loop:

        1. Locate the PR via `gh pr list --head boid/<task_id8>` (first 8
           chars of the child task id).
        2. If the PR is open and mergeable, run
           `gh pr merge --merge --delete-branch`, then
           `git fetch origin && git pull --ff-only origin main`, verify
           against the plan, and either spawn the next dev task or move on
           to exit handling.
        3. If the merge cannot proceed:
           - Plain conflict or CI failure with a clear remediation:
             `boid task reopen <child_id> -m "<focused fix instruction>"`
             so the same child re-runs (rebase / re-push to fix CI). Resume
             monitoring it.
           - Anything ambiguous (no PR, mergeable=UNKNOWN twice, unexpected
             branch protection, etc.): `boid task notify "$BOID_TASK_ID" --ask "..."`
             to consult the user; do not guess.

        Treat aborted children per /boid-plan's existing guidance (no merge
        attempt; diagnose and either retry or escalate).
