id: boid
name: boid

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']

commands:
  claude:
    command:
      - claude
      - --permission-mode
      - bypassPermissions
      - --append-system-prompt
      - "このセッションは boid sandbox 内で実行されています。環境制約については ~/.boid/context/environment.yaml を参照"
  shell:
    command:
      - bash

task_behaviors:
  dev:
    name: one-shot-feedback-dev
    worktree: true
    kits:
      - github.com/novshi-tech/boid-kits/github-pr-verification
      - github.com/novshi-tech/boid-kits/github-auto-merge
    default_instructions:
      main:
        type: execution
        consumer: claude-code
        model: sonnet
        message: |
          task.yaml の title と description に記述された内容を実装せよ。
          コミットする前にユニットテストの通過を確認すること。
          E2E テストはサンドボックス内では実行できない（nft/unshare 等の特権が必要）。E2E の検証は CI に任せること。
      rework:
        type: rework
        consumer: claude-code
        model: sonnet
        message: |
          verification findings に記載された問題を修正せよ。
          コミットする前にユニットテストの通過を確認すること。
          E2E テストはサンドボックス内では実行できない（nft/unshare 等の特権が必要）。E2E の検証は CI に任せること。
  plan:
    name: Plan
    readonly: true
    traits: [tasks]
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instructions:
      main:
        type: execution
        consumer: claude-code
        model: opus
        interactive: true
        message: |
          /boid-plan の記述に従って実装計画を策定せよ。
  auto_plan:
    name: Auto Plan
    readonly: true
    traits: [tasks]
    kits:
      - github.com/novshi-tech/boid-kits/boid-tasks
    default_instructions:
      main:
        type: execution
        consumer: claude-code
        model: sonnet
        interactive: false
        message: |
          /boid-plan の記述に従って実装計画を策定せよ。
