id: boid
name: boid
builtin_commands:
  - boid

task_behaviors:
  dev:
    name: one-shot-dev
    transition: one-shot
    worktree: true
    traits: [instructions]
    default_payload:
      instructions:
        main:
          type: execution
          consumer: claude-code
          message: "task.yaml の title と description に記述された内容を実装せよ"

kits:
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/git
  - github.com/novshi-tech/boid-kits/github-cli
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/codex
