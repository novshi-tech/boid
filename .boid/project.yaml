id: boid
name: boid
builtin_commands:
  - boid

task_behaviors:
  dev:
    name: one-shot-feedback-dev
    worktree: true
    traits: [instructions]
    default_payload:
      instructions:
        main:
          type: execution
          consumer: claude-code
          model: sonnet
          message: |
            task.yaml の title と description に記述された内容を実装せよ。
            コミットする前にユニットテストの通過を確認すること。
            E2E テストはサンドボックス内では実行できない（nft/unshare 等の特権が必要）。E2E の検証は CI に任せること。
        rework:
          type: rework
          consumer: claude-code
          model: sonnet
          message: |
            verification findings に記載された問題を修正せよ。
            コミットする前にユニットテストの通過を確認すること。
            E2E テストはサンドボックス内では実行できない（nft/unshare 等の特権が必要）。E2E の検証は CI に任せること。
  plan:
    name: Plan
    readonly: true
    traits: [instructions, tasks]
    default_payload:
      instructions:
        main:
          type: execution
          consumer: claude-code
          model: opus
          interactive: true
          message: |
            task.yaml の title と description に記述されたテーマについて、ユーザーと対話しながら実装計画を策定せよ。
            タスクが大きい場合は適切な粒度に分解すること。確定後に ~/.boid/output/payload_patch.yaml に以下の形式で書き出すこと：

            payload_patch:
              tasks:
                - title: "タスクのタイトル"
                  ref: "task-a"
                  behavior: "実行モデル名（例: dev）"
                  description: "このタスクを実行するエージェントへの指示。何を・どのように実装するかを詳細に記述する。"
                - title: "次のタスク"
                  ref: "task-b"
                  behavior: "dev"
                  description: "..."
                  depends_on: ["task-a"]
                  depends_on_payload: "artifact.auto-merge.pr.merged"
                  auto_start: true

            ## 依存タスク

            タスク間に順序依存がある場合、後続タスクに以下を設定すること：
            - ref: タスクに任意の名前を付ける。同一バッチ内で depends_on から参照される。
            - depends_on: 依存先タスクの ref 名を指定する。
            - depends_on_payload: "artifact.auto-merge.pr.merged" — 依存先タスクの PR が auto-merge で正常にマージされるまで待機する。
            - auto_start: true — 依存条件が満たされたら自動的に開始する。

            順序依存がないタスクには depends_on を設定しないこと（並列実行される）。

            ## boid-kits の更新

            boid-kits（キットパッケージ群）の更新を伴うタスクは、`project_id: boid-kits` を明示的に設定すること。
            設定しない場合、親タスクのプロジェクト（このリポジトリ = boid）にタスクが作成されてしまい、
            boid-kits リポジトリへの変更として実行されない。

            例:
              tasks:
                - title: "go-dev キットに lint gate を追加"
                  behavior: "dev"
                  description: "..."
                  project_id: "boid-kits"
  auto_plan:
    name: Auto Plan
    readonly: true
    traits: [instructions, tasks]
    default_payload:
      instructions:
        main:
          type: execution
          consumer: claude-code
          model: sonnet
          interactive: false
          message: |
            task.yaml の title と description に記述されたテーマについて、実装計画を策定せよ。
            ~/.boid/output/payload_patch.yaml に以下の形式で書き出すこと：

            payload_patch:
              tasks:
                - title: "タスクのタイトル"
                  ref: "task-a"
                  behavior: "実行モデル名（例: dev）"
                  description: "このタスクを実行するエージェントへの指示。何を・どのように実装するかを詳細に記述する。"
                - title: "次のタスク"
                  ref: "task-b"
                  behavior: "dev"
                  description: "..."
                  depends_on: ["task-a"]
                  depends_on_payload: "artifact.auto-merge.pr.merged"
                  auto_start: true

            ## 依存タスク

            タスク間に順序依存がある場合、後続タスクに以下を設定すること：
            - ref: タスクに任意の名前を付ける。同一バッチ内で depends_on から参照される。
            - depends_on: 依存先タスクの ref 名を指定する。
            - depends_on_payload: "artifact.auto-merge.pr.merged" — 依存先タスクの PR が auto-merge で正常にマージされるまで待機する。
            - auto_start: true — 依存条件が満たされたら自動的に開始する。基本的にtrueを設定する.

            順序依存がないタスクには depends_on を設定しないこと（並列実行される）。

            ## boid-kits の更新

            boid-kits（キットパッケージ群）の更新を伴うタスクは、`project_id: boid-kits` を明示的に設定すること。
            設定しない場合、親タスクのプロジェクト（このリポジトリ = boid）にタスクが作成されてしまい、
            boid-kits リポジトリへの変更として実行されない。

            例:
              tasks:
                - title: "go-dev キットに lint gate を追加"
                  behavior: "dev"
                  description: "..."
                  project_id: "boid-kits"

kits:
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/git
  - github.com/novshi-tech/boid-kits/github-cli
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/codex
  - github.com/novshi-tech/boid-kits/github-pr-verification
  - github.com/novshi-tech/boid-kits/boid-tasks
  - github.com/novshi-tech/boid-kits/github-auto-merge
