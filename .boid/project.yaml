id: 40652295-c610-42da-95c4-6c6e8d28b643
name: boid

# Phase 4-2 (task_behavior simplification): project-top worktree replaces the
# behavior-level `worktree: true` that previously sat on the dev (now executor)
# behavior. `base_branch` is intentionally omitted so executor tasks branch
# from the daemon's current HEAD branch.
worktree: true

kits:
  - github.com/novshi-tech/boid-kits/claude-code
  - github.com/novshi-tech/boid-kits/go-dev
  - github.com/novshi-tech/boid-kits/github-cli

host_commands:
  playwright-cli:
    allow: ['*']
  run-e2e:
    path: e2e/run.sh
commands:
  shell:
    command:
      - bash

# Canonical behavior names: supervisor (formerly "plan") and executor
# (formerly "dev"). The alias map in spec_loader.go still accepts the old
# keys for back-compat, but the boid repo itself uses the canonical names.
# readonly/worktree are no longer settable per-behavior — they are derived
# from the canonical name (supervisor => readonly, executor => writable
# under the project-top worktree).
task_behaviors:
  executor:
    name: executor
    default_instruction:
      type: execution
      agent: claude-code
      model: sonnet
      message: |
          Follow the /boid-executor skill to implement what is described in
          task.yaml's title and description.

          This project overrides the default local-merge model with a PR-per-
          executor model. When the implementation is complete, run the
          /dev-pr-flow skill instead of the default `commit + push`:
          - Use task.yaml's title as the PR title.
          - Start the PR body with `task: <task_id>`, followed by a summary.
          - If CI fails, exit with a non-zero code (boid will then transition
            job_failed → aborted).
          Exit normally on CI success. The hook exit trap fires `boid job done`,
          and the parent supervisor task will merge the PR as part of its
          supervise loop.
  supervisor:
    name: Supervisor
    default_instruction:
      type: execution
      agent: claude-code
      model: opus
      message: |
        Follow the /boid-supervisor skill to build an implementation plan and
        monitor child executor tasks.

        This project uses a PR-per-executor integration path. You own
        PR-merge responsibility for the executor children you spawn (the
        github-auto-merge kit is not attached to executor in this project).
        Once a child executor task reaches `done` in your monitoring loop:

        1. Locate the PR via `gh pr list --head boid/<task_id8>` (first 8
           chars of the child task id).
        2. If the PR is open and mergeable, run
           `gh pr merge --merge --delete-branch`, then
           `git fetch origin && git pull --ff-only origin main`, verify
           against the plan, and either spawn the next executor task or move
           on to exit handling.
        3. If the merge cannot proceed:
           - Plain conflict or CI failure with a clear remediation:
             `boid task reopen <child_id> -m "<focused fix instruction>"`
             so the same child re-runs (rebase / re-push to fix CI). Resume
             monitoring it.
           - Anything ambiguous (no PR, mergeable=UNKNOWN twice, unexpected
             branch protection, etc.): `boid task notify "$BOID_TASK_ID" --ask "..."`
             to consult the user; do not guess.

        Treat aborted children per /boid-supervisor's existing guidance (no
        merge attempt; diagnose and either retry or escalate).
