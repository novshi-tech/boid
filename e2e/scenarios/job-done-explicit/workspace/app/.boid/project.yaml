id: job-done-explicit
name: Job Done Explicit
task_behaviors:
  explicit:
    hooks:
      - id: explicit-done
        command: |
          set -eu

          # Call boid job done explicitly before the hook exits naturally.
          # The daemon must SIGTERM this process, whose EXIT trap will call boid job done
          # again. The idempotency guard must absorb that second call without corrupting
          # the job status from "completed" to "failed".
          boid job done "$BOID_JOB_ID" --exit-code 0

          # This sleep must be interrupted by SIGTERM. If idempotency is broken, the
          # EXIT trap would fire with exit-code 143 and flip the job to "failed".
          sleep 30
