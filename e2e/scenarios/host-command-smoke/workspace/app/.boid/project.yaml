id: e2e-host-ops
name: E2E Host Ops
task_behaviors:
  smoke:
    hooks:
      - id: emit-artifact
        command: |
          set -eu

          fake-hook-cmd --hook-ran

          # alias-echo (host_commands.alias-echo.path = echo-target): the
          # source file's basename is "echo-target" on the host, but the
          # declared short name is "alias-echo". Post 5a-3 cutover
          # (docs/plans/phase5-shim-and-task-context.md PR3) the shim is
          # materialized as /run/boid/bin/alias-echo (declared name), so
          # invoking it by the declared name is the only supported call
          # shape — the pre-5a-3 shape that let you call the source basename
          # (`echo-target`) worked incidentally because the bind mount was
          # at the source's absolute host path; 5a-3 retires that.
          alias-echo --alias-ran

          pr_url="$(gh pr create --title "E2E PR" --body "generated by e2e")"
          systemctl --user restart boid >/dev/null

          mkdir -p "$HOME/.boid/output"
          cat > "$HOME/.boid/output/payload_patch.json" <<EOF
          {"payload_patch":{"verification":{"findings":[{"message":"host ops completed","status":"resolved"}]},"artifact":{"pr_url":"$pr_url"}}}
          EOF
        traits:
          produces: [artifact, verification]
