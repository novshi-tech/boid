id: e2e-host-ops
name: E2E Host Ops
task_behaviors:
  smoke:
    hooks:
      - id: emit-artifact
        command: |
          set -eu

          fake-hook-cmd --hook-ran

          pr_url="$(gh pr create --title "E2E PR" --body "generated by e2e")"
          systemctl --user restart boid >/dev/null

          mkdir -p "$HOME/.boid/output"
          cat > "$HOME/.boid/output/payload_patch.json" <<EOF
          {"payload_patch":{"verification":{"findings":[{"message":"host ops completed","status":"resolved"}]},"artifact":{"pr_url":"$pr_url"}}}
          EOF
        traits:
          produces: [artifact, verification]
