id: e2e-builtin-task-create
name: E2E Builtin Task Create
# NOTE: sandbox /bin/sh = dash (no pipefail, no `[[ ]]`). hooks[].command below
# only uses `set -eu` (POSIX, dash-safe) so no `bash <<'HEREDOC'` wrap is
# needed here — but if you add a `|` pipeline or `[[ ]]` to any hook command
# in this repo, wrap the body in `bash <<'HEREDOC'` instead. See
# docs/plans/script-hook-removal.md §R6 for the full explanation and recipe.
task_behaviors:
  parent:
    hooks:
      - id: spawn-parent
        command: |
          set -eu

          PARENT_ID="$BOID_TASK_ID"

          boid task create >&2 <<EOF
          title: Task A
          behavior: child
          ref: task-a
          parent_id: $PARENT_ID
          EOF

          boid task create >&2 <<EOF
          title: Task B
          behavior: child
          ref: task-b
          parent_id: $PARENT_ID
          EOF

          boid task create >&2 <<EOF
          title: Task C
          behavior: child
          ref: task-c
          parent_id: $PARENT_ID
          auto_start: true
          EOF

          boid task create >&2 <<EOF
          title: Task D
          behavior: child
          ref: task-d
          parent_id: $PARENT_ID
          auto_start: true
          EOF

          # Emit artifact so the parent (one-shot) auto-advances to done.
          boid task update --payload-patch @- <<'PATCH'
          {"artifact":{"summary":"spawned subtasks"}}
          PATCH
        traits:
          produces: [artifact]
    traits: []
  child:
    traits: []
  hook-parent:
    hooks:
      - id: spawn-hook
        command: |
          set -eu

          # hook から boid task create を呼ぶ (hook boid policy が task_create を許可)
          # project_id は broker がコンテキストから自動注入する
          boid task create <<'TASKSPEC'
          title: Hook Spawned Task
          behavior: child
          ref: hook-spawned
          TASKSPEC

          boid task update --payload-patch @- <<'PATCH'
          {"artifact":{}}
          PATCH
    traits: []
