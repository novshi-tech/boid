id: git-gateway-child-branch
name: git-gateway-child-branch
worktree: true
base_branch: main
task_behaviors:
  parent:
    readonly: false
    hooks:
      - id: spawn-child
        traits:
          produces: [artifact]
        # NOTE: hooks[].command runs via `sh -c` (planner.go) and the sandbox
        # bind-mounts the host's /bin/sh, which is dash — dash lacks `[[ ]]` and
        # `set -o pipefail`. Wrap the body in `bash <<'BOID_HOOK_SCRIPT'` (quoted
        # delimiter, so dash passes it through unexpanded and bash does the
        # `$VAR` expansion itself once it reads its own stdin).
        command: |
          bash <<'BOID_HOOK_SCRIPT'
          set -euo pipefail

          # branch-policy-simplification Phase 1 (v0.0.11) 向けの parent 側 hook。
          # 旧版は「子タスクが boid/<id8> branch に着地する」ことを pin していたが、
          # per-task branch と fork point の概念が廃止されたため書き直した。 狙いは:
          #   - 「child task も root task と全く同じく base_branch を直接 checkout
          #     する」(runner の resolveCloneBranch + BuildCloneDeclaration の
          #     CheckoutOnly 経路) を end-to-end で pin すること。
          #
          # 手順:
          #   1. parent 自身 (root task) の clone 上で 1 commit push
          #      → upstream の main tip が parent's commit まで進む
          #   2. `boid task create` で child task (behavior: child, auto_start:
          #      true, parent_id: $BOID_TASK_ID, base_branch 省略) を作る
          #      → auto_start でその task が即 dispatch される。 dispatch 時点で
          #         parent の commit は既に upstream に到達済み (push を待ってから
          #         task create を呼ぶ順)。 child は base_branch を省略しているので
          #         parent の base_branch ("main") をそのまま継承し、その "main" を
          #         直接 checkout する — 別ブランチは一切作らない。

          git config user.name  "Boid E2E Parent"
          git config user.email "e2e-parent@boid.test"

          printf 'parent marker on main\n' > parent-marker.txt
          git add parent-marker.txt
          git commit -q -m "parent push before child spawn"
          git push -q origin HEAD

          parent_pushed_commit="$(git rev-parse HEAD)"

          # child が assertion に使うので、parent の pushed_commit を artifact に
          # 書き出す。 hook が独自に取得しているので payload merge に頼らない。
          # ここでは boid task create の payload 経由でも渡さない — child のクロ
          # ーンには parent-marker.txt が確実に fetch されてくるので、その存在を
          # 「parent の push が届いた」proof として使う。
          boid task create <<EOF
          title: Child Task
          behavior: child
          ref: child-under-parent
          parent_id: $BOID_TASK_ID
          auto_start: true
          EOF

          boid task update --payload-patch @- <<EOF
          {"artifact":{"source":"spawn-child","parent_pushed_commit":"${parent_pushed_commit}"}}
          EOF
          BOID_HOOK_SCRIPT
  child:
    readonly: false
    hooks:
      - id: verify-child-branch
        traits:
          consumes: ["artifact?"]
          produces: [artifact]
        command: |
          bash <<'BOID_HOOK_SCRIPT'
          set -euo pipefail

          # branch-policy-simplification Phase 1 (v0.0.11) 向けの child 側 hook。
          # 子 task の sandbox は BuildCloneDeclaration の CheckoutOnly 経路で
          # 起動される — root task と全く同じ扱いで、per-task branch も fork point
          # も存在しない:
          #   - Branch          = BOID_BASE_BRANCH ("main"、 parent から継承)
          #   - CheckoutOnly    = true  (runner が checkout -B main origin/main)
          #
          # よってこの hook が観測すべき事実:
          #   (a) 現在の HEAD branch 名が BOID_BASE_BRANCH ("main") そのものである
          #       (別ブランチを新規作成しない)
          #   (b) parent-marker.txt が clone に含まれている
          #       (parent の push が origin/main に届いていて、child の fresh clone が
          #        それを直接 fetch していることの proof)
          #   (c) HEAD の親コミット (== origin/main tip) の rev が parent の push
          #       と一致していれば理想だが、artifact 経由の受渡しは複雑なので
          #       (b) のファイル存在で代替する (retired worktree scenario と同じ
          #        「観測可能な副作用で pin する」路線)

          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          expected_branch="${BOID_BASE_BRANCH:-main}"

          branch_matches_base_branch=false
          if [[ "$current_branch" == "$expected_branch" ]]; then
            branch_matches_base_branch=true
          fi

          parent_marker_present=false
          if [[ -f parent-marker.txt ]]; then
            parent_marker_present=true
          fi

          # HEAD is "main" itself (no separate branch); git-log against just HEAD
          # should include parent's commit since child directly cloned the same branch
          # parent already pushed to.
          parent_commit_in_log=false
          if git log --format='%H' HEAD | grep -q .; then
            # find the commit that touched parent-marker.txt
            parent_marker_commit="$(git log --format='%H' HEAD -- parent-marker.txt | head -1)"
            if [[ -n "$parent_marker_commit" ]]; then
              parent_commit_in_log=true
            fi
          fi

          if [[ "$branch_matches_base_branch" != "true" ]] \
             || [[ "$parent_marker_present" != "true" ]] \
             || [[ "$parent_commit_in_log" != "true" ]]; then
            printf 'FAIL: child branch resolution did not behave as expected\n' >&2
            printf '  current_branch=%s expected_branch=%s\n' "$current_branch" "$expected_branch" >&2
            printf '  branch_matches_base_branch=%s parent_marker_present=%s parent_commit_in_log=%s\n' \
              "$branch_matches_base_branch" "$parent_marker_present" "$parent_commit_in_log" >&2
            git log --oneline -5 HEAD >&2 || true
            ls -la >&2 || true
            exit 1
          fi

          boid task update --payload-patch @- <<EOF
          {"artifact":{"source":"verify-child-branch","current_branch":"${current_branch}","branch_matches_base_branch":true,"parent_marker_present":true,"parent_commit_in_log":true}}
          EOF
          BOID_HOOK_SCRIPT
