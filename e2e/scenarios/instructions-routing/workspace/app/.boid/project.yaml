id: instructions-routing
name: Instructions Routing
task_behaviors:
  impl:
    name: Implementation
    transition: feedback-loop
    traits: [instructions, artifact, verification]
    kits:
      - ref: github.com/novshi-tech/boid-kits/instructions-agent-a
        as: agent-a
      - ref: github.com/novshi-tech/boid-kits/instructions-agent-b
        as: agent-b
    default_instructions:
      executor:
        type: execution
        consumer: agent-a
        message: "implement the task"
      reviewer:
        type: verification
        consumer: agent-b
        message: "review correctness"
      security:
        type: verification
        consumer: agent-b
        message: "check security aspects"
