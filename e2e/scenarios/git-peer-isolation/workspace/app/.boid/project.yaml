id: git-peer-isolation
name: Git Peer Isolation
worktree: true
base_branch: main
task_behaviors:
  executor:
    hooks:
      - id: test-peer-write-reject
        command: |
          set -eu
          PEER_DIR="${E2E_PEER_PROJECT_DIR:?}"

          # Sandbox はワークスペースピアを read-only でバインドマウントする。
          # サンドボックス内から直接ファイルを書こうとすると EROFS で失敗する。
          if touch "$PEER_DIR/evil.txt" 2>/tmp/peer-write-err.txt; then
              printf 'FAIL: direct write to peer project should be rejected (read-only mount)\n' >&2
              exit 1
          fi

          printf '%s\n' '{"artifact":{"peer_write_rejected":true}}' \
              | boid task update --payload-patch @-
