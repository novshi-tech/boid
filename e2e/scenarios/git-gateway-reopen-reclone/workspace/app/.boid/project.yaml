id: git-gateway-reopen-reclone
name: git-gateway-reopen-reclone
worktree: true
base_branch: main
task_behaviors:
  executor:
    hooks:
      - id: reopen-reclone
        traits:
          consumes: ["artifact?"]
          produces: [artifact]
        # NOTE: hooks[].command runs via `sh -c` (planner.go) and the sandbox
        # bind-mounts the host's /bin/sh, which is dash — dash lacks `[[ ]]` and
        # `set -o pipefail`. Wrap the body in `bash <<'BOID_HOOK_SCRIPT'` (quoted
        # delimiter, so dash passes it through unexpanded and bash does the
        # `$VAR` expansion itself once it reads its own stdin).
        command: |
          bash <<'BOID_HOOK_SCRIPT'
          set -euo pipefail

          # docs/plans/git-gateway-cutover.md PR7b — 新規シナリオ 4/5:
          # 「reopen が再 clone + branch checkout になる」の検証。
          #
          # 期待する挙動 (docs/plans/container-based-boid.md 「決定: clone の置き場所と
          # reopen 意味論」・runner の performCloneSteps: 「reopen: idempotent by
          # re-clone. Wipe any leftover TargetDir contents from a previous attempt」):
          #   attempt 1: sandbox 内 clone にファイルを 2 つ用意する
          #     - pushed.txt   → commit + push (upstream に反映)
          #     - local-only.txt → commit しない (ローカルにだけ存在)
          #   attempt 2 (reopen 後の再 dispatch): 新しい sandbox で
          #     - pushed.txt は fresh clone に fetch されてきているはず (visible)
          #     - local-only.txt は前回の clone を wipe したので消えているはず (absent)
          #     - HEAD が attempt 1 で push した commit と一致するはず
          # を hook 側で全部 pin する。
          #
          # attempt 判定は `boid task payload --field artifact.attempt`
          # (Phase 5b task-context RPC, docs/plans/phase5-shim-and-task-
          # context.md — 5b-6 cutover で $HOME/.boid/context/payload.json の
          # file 配布は撤去済み) を見る。reopen action は instruction 上書き
          # 無しで送るため、task.payload は attempt 1 の artifact を merge
          # した状態で attempt 2 に持ち込まれる (internal/api/workflow_action.go
          # の MergePayload 経路)。

          attempt=1
          attempt_field="$(boid task payload --field artifact.attempt 2>/dev/null || true)"
          if [[ "$attempt_field" == "1" ]]; then
            attempt=2
          fi

          git config user.name  "Boid E2E Reopen"
          git config user.email "e2e-reopen@boid.test"

          if [[ $attempt == 1 ]]; then
            # push-visible content
            printf 'pushed content on attempt 1\n' > pushed.txt
            git add pushed.txt
            git commit -q -m "attempt 1 pushed commit"
            pushed_commit="$(git rev-parse HEAD)"
            git push -q origin HEAD

            # local-only (never committed) — must NOT survive reopen re-clone
            printf 'local-only content on attempt 1 (must be wiped on reopen)\n' > local-only.txt

            boid task update --payload-patch @- <<EOF
          {"artifact":{"source":"reopen-reclone","attempt":1,"pushed_commit":"${pushed_commit}"}}
          EOF
            exit 0
          fi

          # attempt 2 (reopen 後): 前回 attempt 1 の pushed_commit を artifact から
          # 復元してから、fresh clone の状態を全項目 assertion する。
          prev_pushed_commit="$(boid task payload --field artifact.pushed_commit 2>/dev/null || true)"
          [[ -n "$prev_pushed_commit" ]] || { printf 'FAIL: attempt 2 could not recover attempt 1 pushed_commit from `boid task payload`\n' >&2; boid task payload >&2 || true; exit 1; }

          pushed_file_present=false
          local_only_absent=false
          head_matches=false

          if [[ -f pushed.txt ]] && grep -q 'pushed content on attempt 1' pushed.txt; then
            pushed_file_present=true
          fi

          if [[ ! -e local-only.txt ]]; then
            local_only_absent=true
          fi

          current_head="$(git rev-parse HEAD)"
          if [[ "$current_head" == "$prev_pushed_commit" ]]; then
            head_matches=true
          fi

          if [[ "$pushed_file_present" != "true" ]] || [[ "$local_only_absent" != "true" ]] || [[ "$head_matches" != "true" ]]; then
            printf 'FAIL: reopen did not behave as a fresh re-clone\n' >&2
            printf '  pushed_file_present=%s local_only_absent=%s head_matches=%s\n' "$pushed_file_present" "$local_only_absent" "$head_matches" >&2
            printf '  current_head=%s prev_pushed_commit=%s\n' "$current_head" "$prev_pushed_commit" >&2
            ls -la >&2
            exit 1
          fi

          boid task update --payload-patch @- <<EOF
          {"artifact":{"source":"reopen-reclone","attempt":2,"pushed_file_present":true,"local_only_absent":true,"head_matches":true,"prev_pushed_commit":"${prev_pushed_commit}"}}
          EOF
          BOID_HOOK_SCRIPT
