hooks:
  - id: emit-artifact

gates:
  - id: host-ops
    phase: exit
    traits:
      consumes: [artifact]
env:
  E2E_STATE_DIR: ${E2E_STATE_DIR}
host_commands:
  gh:
    path: ${E2E_BIN_DIR}/gh
    allow:
      - pr
  systemctl:
    path: ${E2E_BIN_DIR}/systemctl
    allow:
      - restart
  fake-hook-cmd:
    path: ${E2E_BIN_DIR}/fake-hook-cmd
    allow:
      - "*"
